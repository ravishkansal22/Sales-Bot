# =============================================================================
# Alembic Configuration — Ghost Negotiator
# =============================================================================
# The sqlalchemy.url value is overridden at runtime by alembic/env.py which
# reads DATABASE_URL from the environment.  The placeholder below is kept as
# documentation only and is never used in practice.
# =============================================================================

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template used to generate migration identifiers.
# The default is %(rev)s, but a timestamp prefix aids chronological sorting.
file_template = %%(rev)s_%%(slug)s

# Truncate slug to this many characters
truncate_slug_length = 40

# Set to 'true' to apply each revision as its own transaction rather than
# grouping multiple revisions under a single transaction.
# transaction_per_migration = false

# sys.path style, prepends to sys.path when present.
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

# The sqlalchemy.url is read from the DATABASE_URL environment variable in
# env.py.  This placeholder is never used.
sqlalchemy.url = postgresql+asyncpg://ghost:ghost_secret@localhost:5432/ghost_negotiator

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
